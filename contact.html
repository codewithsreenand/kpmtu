<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact – KPMTU</title>
    <meta name="description" content="Contact details for Kerala Paramedical Technicians Union." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Malayalam:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="assets/js/i18n.js" defer></script>
    <script src="assets/js/nav.js" defer></script>
  </head>
  <body data-page="contact">
    <header id="main-header"></header>

    <main>
      <section class="container">
        <h1 class="section-title" data-i18n="contact_title"></h1>
        <p class="section-subtitle">&nbsp;</p>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 1.5rem;">
          <div style="background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem;">
            <h2 class="section-title" style="font-size:1.15rem;" data-i18n="contact_address_label"></h2>
            <p>Edagramam, Karumam, Thiruvananthapuram, Kerala - 695002</p>

            <h3 style="margin-top: 1.2rem; font-size:1rem; font-weight:600;" data-i18n="contact_phone_label"></h3>
            <p>8590982815</p>

            <h3 style="margin-top: 1.2rem; font-size:1rem; font-weight:600;" data-i18n="contact_whatsapp_label"></h3>
            <p>8590982815</p>

            <h3 style="margin-top: 1.2rem; font-size:1rem; font-weight:600;" data-i18n="contact_email_label"></h3>
            <p><a href="mailto:info@kmptu.com">info@kmptu.com</a></p>
          </div>

          <div style="background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;">
            <div style="padding: 1.5rem;">
              <h2 class="section-title" style="font-size:1.15rem;" data-i18n="contact_map_label"></h2>
            </div>
            <iframe
              width="100%"
              height="280"
              style="border:0"
              loading="lazy"
              allowfullscreen
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3913.1037117528364!2d76.94506507535813!3d8.51662238410303!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b05f2fb7b513f0b%3A0xf11fa1b8c7b18302!2sThiruvananthapuram%2C%20Kerala%2C%20India!5e0!3m2!1sen!2sus!4v1700363912316!5m2!1sen!2sus"
              aria-label="Google map location"
            ></iframe>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer container" style="display: flex; flex-direction: column; gap: 2rem; padding-top: 3rem; padding-bottom: 3rem;">
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem;">
        <div>
          <div style="font-size: 1.1rem; margin-bottom: 1rem; font-weight: 600;" data-i18n="footer_text"></div>
        </div>
        <div>
          <h3 style="margin-bottom: 1rem; font-weight: 600; font-size: 1.2rem;" data-i18n="footer_quick_links"></h3>
          <ul style="list-style: none; padding: 0; display: flex; flex-direction: column; gap: 0.5rem;">
            <li><a href="about.html" data-i18n="nav_about" style="text-decoration: none; color: inherit;"></a></li>
            <li><a href="leadership.html" data-i18n="nav_leadership" style="text-decoration: none; color: inherit;"></a></li>
            <li><a href="membership.html" data-i18n="nav_membership" style="text-decoration: none; color: inherit;"></a></li>
            <li><a href="contact.html" data-i18n="nav_contact" style="text-decoration: none; color: inherit;"></a></li>
          </ul>
        </div>
        <div>
          <h3 style="margin-bottom: 1rem; font-weight: 600; font-size: 1.2rem;" data-i18n="nav_contact"></h3>
          <div data-i18n="footer_contact_address" style="line-height: 1.6;"></div>
        </div>
      </div>
      <div style="text-align: center; margin-top: 2rem; border-top: 1px solid #eaeaea; padding-top: 2rem; font-size: 0.9rem; color: #666;">
        <p data-i18n="footer_note"></p>
      </div>
    </footer>
  </body>
</html>
