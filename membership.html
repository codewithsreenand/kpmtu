<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Membership – KPMTU</title>
    <meta name="description" content="Membership benefits and application for KPMTU." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Malayalam:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="assets/js/i18n.js" defer></script>
    <script src="assets/js/nav.js" defer></script>
  </head>
  <body data-page="membership">
    <header id="main-header"></header>

    <main>
      <section class="container">
        <h1 class="section-title" data-i18n="membership_title"></h1>
        <p class="section-subtitle">&nbsp;</p>

        <div style="margin-top: 2rem; display: grid; gap: 1.5rem;">
          <div style="background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem;">
            <h2 class="section-title" style="font-size:1.15rem;" data-i18n="membership_benefits_title"></h2>
            <p data-i18n="membership_benefits"></p>
          </div>

          <div style="background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem;">
            <h2 class="section-title" style="font-size:1.15rem;" data-i18n="membership_why_title"></h2>
            <ul style="margin: 1rem 0 0 1rem;">
              <li data-i18n="membership_why_1"></li>
              <li data-i18n="membership_why_2"></li>
              <li data-i18n="membership_why_3"></li>
            </ul>
          </div>

          <div style="background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; overflow: hidden; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
            <h2 class="section-title" style="font-size:1.15rem; margin-bottom: 0;" data-i18n="leadership_state_committee"></h2>
            <img src="assets/images/state-committee-poster.jpeg" alt="State Committee Poster" style="width: 100%; height: auto; border-radius: 8px; box-shadow: var(--shadow);" onerror="this.style.display='none'">
          </div>

          <div style="background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem;">
            <p class="text-muted" data-i18n="membership_cta"></p>
            <div style="margin-top: 1rem;">
              <a class="btn btn-primary" href="membership-form.html" data-i18n="form_submit"></a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer container" style="display: flex; flex-direction: column; gap: 2rem; padding-top: 3rem; padding-bottom: 3rem;">
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem;">
        <div>
          <div style="font-size: 1.1rem; margin-bottom: 1rem; font-weight: 600;" data-i18n="footer_text"></div>
        </div>
        <div>
          <h3 style="margin-bottom: 1rem; font-weight: 600; font-size: 1.2rem;" data-i18n="footer_quick_links"></h3>
          <ul style="list-style: none; padding: 0; display: flex; flex-direction: column; gap: 0.5rem;">
            <li><a href="about.html" data-i18n="nav_about" style="text-decoration: none; color: inherit;"></a></li>
            <li><a href="leadership.html" data-i18n="nav_leadership" style="text-decoration: none; color: inherit;"></a></li>
            <li><a href="membership.html" data-i18n="nav_membership" style="text-decoration: none; color: inherit;"></a></li>
            <li><a href="contact.html" data-i18n="nav_contact" style="text-decoration: none; color: inherit;"></a></li>
          </ul>
        </div>
        <div>
          <h3 style="margin-bottom: 1rem; font-weight: 600; font-size: 1.2rem;" data-i18n="nav_contact"></h3>
          <div data-i18n="footer_contact_address" style="line-height: 1.6;"></div>
        </div>
      </div>
      <div style="text-align: center; margin-top: 2rem; border-top: 1px solid #eaeaea; padding-top: 2rem; font-size: 0.9rem; color: #666;">
        <p data-i18n="footer_note"></p>
      </div>
    </footer>
  </body>
</html>
